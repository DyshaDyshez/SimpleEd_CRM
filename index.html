<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimpleEd CRM — Панель учителя</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css' rel='stylesheet' />
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="logo">
      <i class="fas fa-book-open"></i>
      <span>SimpleEd</span>
    </div>
    <nav>
      <a href="#" data-page="dashboard" class="nav-link active"><i class="fas fa-home"></i><span>Главная</span></a>
      <a href="#" data-page="students" class="nav-link"><i class="fas fa-users"></i><span>Ученики</span></a>
      <a href="#" data-page="groups" class="nav-link"><i class="fas fa-th-large"></i><span>Группы</span></a>
      <a href="#" data-page="schedule" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Расписание</span></a>
      <a href="#" data-page="finance" class="nav-link"><i class="fas fa-coins"></i><span>Финансы</span></a>
      <a href="#" data-page="notes" class="nav-link"><i class="fas fa-sticky-note"></i><span>Заметки</span></a>
    </nav>
    <div class="sidebar-footer">
      <button id="supportBtn" class="btn-sm"><i class="fas fa-headset"></i><span>Поддержка</span></button>
      <button id="logoutBtn" class="btn-sm logout-btn"><i class="fas fa-sign-out-alt"></i><span>Выйти</span></button>
    </div>
  </aside>

  <main class="main-content">
    <header>
      <h1 id="pageTitle">Загрузка...</h1>
      <div class="user-profile">
        <span id="teacherNameDisplay">Учитель</span>
        <span id="userAvatar" class="avatar">U</span>
      </div>
    </header>
    <div id="contentArea"></div>
  </main>
</div>

<!-- ШАБЛОНЫ -->
<template id="dashboardTemplate">
  <div class="dashboard-grid">
    <div class="card stat-card"><h3><i class="fas fa-chart-bar"></i> Статистика</h3><div class="stat-value">0 <span>уроков</span></div><div class="stat-money">0 ₽</div></div>
    <div class="card note-card"><h3><i class="fas fa-sticky-note"></i> Заметка</h3><p>Мои ученики</p></div>
    <div class="card"><h3><i class="fas fa-clock"></i> Ближайшие уроки</h3><div class="lesson-list"><p class="text-muted">Нет уроков</p></div></div>
  </div>
</template>

<template id="studentsTemplate">
  <div class="form-card">
    <h2>Ученики</h2>
    <button id="addStudentBtn" class="btn btn-primary mb-3"><i class="fas fa-plus"></i> Добавить ученика</button>
    <div id="studentFormContainer" class="hidden"></div>
    <div class="table-responsive">
      <table>
        <thead><tr><th>Имя</th><th>Родитель</th><th>Телефон</th><th>Группа</th><th>Статус</th><th></th></tr></thead>
        <tbody id="studentsTableBody"><tr><td colspan="6">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<template id="groupsTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2>Группы</h2>
      <div class="flex gap-2">
        <button id="addGroupBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Создать группу</button>
        <div class="view-switcher flex gap-1">
          <button data-view="cards" class="btn-sm active">Карты</button>
          <button data-view="table" class="btn-sm">Таблица</button>
        </div>
      </div>
    </div>
    <div id="groupFormContainer" class="hidden"></div>
    <div id="groupsViewContainer"></div>
  </div>
</template>

<template id="scheduleTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2>Расписание занятий</h2>
      <button id="assignLessonBtn" class="btn btn-primary"><i class="fas fa-calendar-plus"></i> Назначить урок</button>
    </div>
    <div id='calendar'></div>
    <div id="lessonFormContainer" class="hidden"></div>
    <div class="schedule-controls">
      <input type="date" id="filterDateStart"><input type="date" id="filterDateEnd">
      <select id="filterGroupId"><option value="">Все группы</option></select>
      <button id="applyFiltersBtn" class="btn btn-sm">Применить</button>
    </div>
    <div class="schedule-list" id="scheduleList"><p>Загрузка...</p></div>
  </div>
</template>



<!-- Финансы теплейт -->
<template id="financeTemplate">
    <div class="form-card">
      <div class="card-header">
        <h2>Финансы</h2>
        <button id="addPaymentGlobalBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Добавить платёж</button>
      </div>
  
      <!-- Сводка -->
      <div class="finance-summary" id="financeSummary">
        <div class="summary-item"><span>Всего оплат:</span> <strong id="totalCount">0</strong></div>
        <div class="summary-item"><span>Сумма (₽):</span> <strong id="totalAmount">0</strong></div>
        <div class="summary-item"><span>Уроков оплачено:</span> <strong id="totalLessons">0</strong></div>
      </div>
  
      <!-- Фильтры -->
      <div class="filters">
        <select id="filterStudent"><option value="">Все ученики</option></select>
        <select id="filterGroup"><option value="">Все группы</option></select>
        <input type="date" id="filterDateFrom" placeholder="С даты">
        <input type="date" id="filterDateTo" placeholder="По дату">
        <select id="filterStatus"><option value="">Все статусы</option><option value="paid">Оплачен</option><option value="cancelled">Отменён</option></select>
        <button id="applyFinanceFilters" class="btn btn-sm btn-primary">Применить</button>
        <button id="resetFinanceFilters" class="btn btn-sm btn-secondary">Сбросить</button>
      </div>
  
      <!-- Таблица -->
      <div class="table-responsive">
        <table id="financeTable">
          <thead>
            <tr>
              <th>Дата</th><th>Ученик</th><th>Группа</th><th>Сумма</th><th>Уроков</th><th>Период</th><th>Заметка</th><th>Статус</th><th></th>
            </tr>
          </thead>
          <tbody id="financeTableBody"></tbody>
        </table>
      </div>
    </div>
  </template>




<template id="notesTemplate">
  <div class="form-card"><h2>Заметки</h2><p>В разработке</p></div>
</template>

<template id="groupCardTemplate">
  <div class="group-card">
    <div class="group-card-header"><h3 class="group-name"></h3><span class="group-subject"></span></div>
    <div class="group-stats"><span><strong class="students-count">0</strong> учеников</span><span>Следующее занятие: <span class="next-lesson">Нет занятий</span></span></div>
    <div class="group-students-preview"><div class="no-students">Нет учеников</div></div>
    <div class="group-card-footer">
      <button class="btn-icon open-full-group" title="Открыть"><i class="fas fa-eye"></i></button>
      <button class="btn-icon schedule-lesson-btn" title="Назначить урок"><i class="fas fa-calendar-plus"></i></button>
      <button class="btn-icon delete-group" title="Удалить"><i class="fas fa-trash"></i></button>
    </div>
  </div>
</template>

<template id="groupFullCardTemplate">
  <div class="modal">
    <div class="modal-card">
      <div class="modal-header"><h2 id="fullGroupName"></h2><button class="close-modal">&times;</button></div>
      <div class="modal-body">
        <div class="tabs">
          <button class="tab active" data-tab="info">Информация</button>
          <button class="tab" data-tab="students">Ученики</button>
          <button class="tab" data-tab="lessons">Расписание</button>
        </div>
        <div class="tab-content active" id="tabGroupInfo">
          <form id="groupInfoForm"><div class="form-group">
            <label>Заметки</label>
            <textarea id="groupNotes" rows="3"></textarea>
          </div><div class="form-grid"><div class="form-group"><label>Название</label><input id="editGroupName" required></div><div class="form-group"><label>Предмет</label><input id="editGroupSubject"></div></div></form>
        </div>
        <div class="tab-content" id="tabGroupStudents">
          <div class="students-list-full"></div>
          <p class="no-students-tab">Нет учеников в группе</p>
          <button class="btn btn-primary mt-2" id="addStudentToGroupBtn"><i class="fas fa-plus"></i> Добавить ученика</button>
        </div>
        <div class="tab-content" id="tabGroupLessons">
          <div class="lessons-list-full"></div>
          <p class="no-lessons-tab">Нет запланированных уроков</p>
          <button class="btn btn-primary mt-2" id="scheduleLessonInGroupBtn"><i class="fas fa-calendar-plus"></i> Назначить урок</button>
        </div>
      </div>
      <div class="modal-footer"><button id="saveFullGroup" class="btn btn-success">Сохранить</button></div>
    </div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
<script type="module" src="./modules/main.js"></script>
</body>
</html>
