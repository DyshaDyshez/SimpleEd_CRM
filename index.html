<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimpleEd CRM — Панель учителя</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css' rel='stylesheet' />
  <!-- Библиотека для экспорта в Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <!-- FullCalendar JS -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>

  <!-- Chart.js для графиков статистики -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Shepherd.js для обучалки -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shepherd.js@11.2.0/dist/css/shepherd.css"/>

  <script type="module" src="./modules/students/students-main.js"></script>


</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="logo">
      <i class="fas fa-book-open"></i>
      <span>SimpleEd</span>
    </div>
    <nav>
      <a href="#" data-page="dashboard" class="nav-link active"><i class="fas fa-home"></i><span>Главная</span></a>
      <a href="#" data-page="students" class="nav-link"><i class="fas fa-users"></i><span>Ученики</span></a>
      <a href="#" data-page="groups" class="nav-link"><i class="fas fa-th-large"></i><span>Группы</span></a>
      <a href="#" data-page="schedule" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Расписание</span></a>
      <a href="#" data-page="finance" class="nav-link"><i class="fas fa-coins"></i><span>Финансы</span></a>
      
          <!-- НОВАЯ ВКЛАДКА -->
    <a href="#" data-page="stats" class="nav-link">
      <i class="fas fa-chart-pie"></i>
      <span>Статистика</span>

      <a href="#" data-page="lessons" class="nav-link">
        <i class="fas fa-book-open"></i>
        <span>Все уроки</span>
      </a>

      <a href="#" data-page="notes" class="nav-link"><i class="fas fa-sticky-note"></i><span>Заметки</span></a>

      <a href="#" id="helpBtn" class="nav-link">
        <i class="fas fa-question-circle"></i>
        <span>Краткое обучение</span>
    </a>

    </nav>
    <div class="sidebar-footer">
      
      <button id="logoutBtn" class="btn-sm logout-btn"><i class="fas fa-sign-out-alt"></i><span>Выйти</span></button>
      <a href="privacy.html" target="_blank" class="btn-sm logout-btn">Политика конфиденциальности</a>
    </div>
    
  </aside>

  <!-- Кнопка чата с поддержкой -->
<div id="supportChatBtn" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 100;">
  <button class="btn btn-primary" style="border-radius: 50px; padding: 0.75rem 1.5rem; box-shadow: var(--shadow-md);">
    <i class="fas fa-comment-dots"></i> Чат с поддержкой
  </button>
</div>

  <main class="main-content">
    <header>
      <h1 id="pageTitle">Загрузка...</h1>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <!-- Колокольчик уведомлений -->
        <div class="notifications-wrapper" style="position: relative; cursor: pointer;" id="notificationsBell">
          <i class="fas fa-bell" style="font-size: 1.5rem; color: var(--text-secondary);"></i>
          <span id="unreadBadge" class="unread-badge hidden">0</span>
        </div>
        <!-- Профиль -->
        <div class="user-profile">
          <span id="teacherNameDisplay">Учитель</span>
          <span id="userAvatar" class="avatar">U</span>
        </div>
      </div>
      
    </header>
    <div id="contentArea"></div>
  </main>
</div>

<!-- ШАБЛОНЫ -->
<template id="dashboardTemplate">
  <div class="dashboard-grid">
    <!-- Статистика -->
    <div class="card stat-card">
      <h3><i class="fas fa-chart-bar"></i> Статистика</h3>
      <div class="stat-value"><span id="totalLessonsCount">0</span> <span>уроков</span></div>
      <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
        <div class="stat-money"><span id="totalEarningsRUB">0</span> ₽</div>
        <div class="stat-money"><span id="totalEarningsKZT">0</span> ₸</div>
      </div>
    </div>

    <!-- Ближайшие уроки -->
    <div class="card upcoming-card">
      <div class="card-header">
        <h3><i class="fas fa-clock"></i> Ближайшие уроки</h3>
        <button class="btn btn-sm btn-primary" id="quickAssignLessonBtn">
          <i class="fas fa-plus"></i> Назначить
        </button>
      </div>
      <div class="lesson-list" id="upcomingLessonsList">
        <p class="text-muted">Загрузка...</p>
      </div>
    </div>

    <!-- Проведённые уроки -->
    <div class="card completed-card">
      <div class="card-header">
        <h3><i class="fas fa-check-circle"></i> Проведённые уроки</h3>
        <button class="btn btn-sm btn-success" id="addCompletedLessonBtn">
          <i class="fas fa-plus"></i> Добавить
        </button>
      </div>
      <div class="lesson-list" id="completedLessonsList">
        <p class="text-muted">Нет проведённых уроков</p>
      </div>
    </div>
  </div>
</template>




<template id="studentsTemplate">
  <div class="form-card">
    <h2>Ученики</h2>
    <button id="addStudentBtn" class="btn btn-primary mb-3"><i class="fas fa-plus"></i> Добавить ученика</button>
    <div id="studentFormContainer" class="hidden"></div>
    <div class="table-responsive">
      <table>
        <thead><tr><th>Имя</th><th>Родитель</th><th>Телефон</th><th>Группа</th><th>Статус</th><th>Баланс</th><th></th></tr></thead>
        <tbody id="studentsTableBody"><tr><td colspan="6">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>
</template>

<template id="groupsTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2>Группы</h2>
      <div class="flex gap-2">
        <button id="addGroupBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Создать группу</button>
        <div class="view-switcher flex gap-1">
          <button data-view="cards" class="btn-sm active">Карты</button>
          <button data-view="table" class="btn-sm">Таблица</button>
        </div>
      </div>
    </div>
    <div id="groupFormContainer" class="hidden"></div>
    <div id="groupsViewContainer"></div>
  </div>
</template>

<template id="scheduleTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2>Расписание занятий</h2>
      <button id="assignLessonBtn" class="btn btn-primary"><i class="fas fa-calendar-plus"></i> Назначить урок</button>
    </div>
    <div id='calendar'></div>
    <div id="lessonFormContainer" class="hidden"></div>
    <div class="schedule-controls">
      <input type="date" id="filterDateStart"><input type="date" id="filterDateEnd">
      <select id="filterGroupId"><option value="">Все группы</option></select>
      <button id="applyFiltersBtn" class="btn btn-sm">Применить</button>
    </div>
    <div class="schedule-list" id="scheduleList"><p>Загрузка...</p></div>
  </div>
</template>



<!-- Финансы теплейт -->
<template id="financeTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2>Финансы</h2>
      <button id="addPaymentGlobalBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Добавить платёж</button>
    </div>

    <!-- Сводка -->
    <div class="finance-summary" id="financeSummary">
      <div class="summary-item"><span>Всего оплат:</span> <strong id="totalCount">0</strong></div>
      <div class="summary-item"><span>Сумма (₽):</span> <strong id="totalAmountRUB">0</strong></div>
      <div class="summary-item"><span>Сумма (₸):</span> <strong id="totalAmountKZT">0</strong></div>
      <div class="summary-item"><span>Уроков оплачено:</span> <strong id="totalLessons">0</strong></div>
    </div>

    <!-- Фильтры -->
    <div class="filters">
      <select id="filterStudent"><option value="">Все ученики</option></select>
      <select id="filterGroup"><option value="">Все группы</option></select>
      <select id="filterCurrency">
        <option value="">Все валюты</option>
        <option value="RUB">₽ RUB</option>
        <option value="KZT">₸ KZT</option>
      </select>
      <input type="date" id="filterDateFrom" placeholder="Добавлено с">
      <input type="date" id="filterDateTo" placeholder="Добавлено по">
      <input type="number" id="filterMinAmount" placeholder="Сумма от" step="0.01" style="width: 100px;">
      <input type="number" id="filterMaxAmount" placeholder="Сумма до" step="0.01" style="width: 100px;">
      <select id="filterStatus">
        <option value="">Все статусы</option>
        <option value="paid">Оплачен</option>
        <option value="cancelled">Отменён</option>
      </select>
      <button id="applyFinanceFilters" class="btn btn-sm btn-primary">Применить</button>
      <button id="resetFinanceFilters" class="btn btn-sm btn-secondary">Сбросить</button>
    </div>

    <!-- Таблица -->
    <div class="table-responsive">
      <table id="financeTable">
        <thead>
          <tr>
            <th>Дата оплаты</th>
            <th>Добавлено</th>
            <th>Ученик</th>
            <th>Группа</th>
            <th>Вал.</th>
            <th>Сумма</th>
            <th>Уроков</th>
            <th>Период</th>
            <th>Заметка</th>
            <th>Статус</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="financeTableBody"></tbody>
      </table>
    </div>
  </div>
</template>



<!-- Шаблон страницы статистики -->
<template id="statsTemplate">
  <div class="form-card">
      <div class="card-header">
          <h2><i class="fas fa-chart-line"></i> Статистика</h2>
          <div class="filters">
              <select id="teacherStatsPeriod">
                  <option value="7">Последние 7 дней</option>
                  <option value="30" selected>Последние 30 дней</option>
                  <option value="90">Последние 3 месяца</option>
                  <option value="365">Последний год</option>
                  <option value="all">Всё время</option>
              </select>
              <button class="btn btn-sm btn-primary" id="refreshTeacherStatsBtn">
                  <i class="fas fa-sync-alt"></i> Обновить
              </button>
              <button class="btn btn-sm btn-success" id="exportTeacherStatsBtn">
                  <i class="fas fa-download"></i> Экспорт
              </button>
          </div>
      </div>

      <!-- Общие показатели -->
      <div class="stats-grid-teacher">
          <div class="stat-card-teacher highlight">
              <div class="stat-icon"><i class="fas fa-ruble-sign"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherTotalRevenueRUB">0 ₽</div>
                  <div class="stat-label">Выручка (₽)</div>
              </div>
          </div>
          <div class="stat-card-teacher highlight">
              <div class="stat-icon"><i class="fas fa-tenge"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherTotalRevenueKZT">0 ₸</div>
                  <div class="stat-label">Выручка (₸)</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherTotalLessons">0</div>
                  <div class="stat-label">Проведено уроков</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherActiveStudents">0</div>
                  <div class="stat-label">Активных учеников</div>
              </div>
          </div>
      </div>

      <!-- Дополнительные метрики -->
      <div class="stats-grid-teacher" style="margin-top: 1.5rem;">
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-calendar"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherRevenueThisMonthRUB">0 ₽</div>
                  <div class="stat-label">Выручка за месяц (₽)</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-calendar"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherRevenueThisMonthKZT">0 ₸</div>
                  <div class="stat-label">Выручка за месяц (₸)</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-trophy"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherBestStudent">—</div>
                  <div class="stat-label">Самый активный ученик</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherBestGroup">—</div>
                  <div class="stat-label">Самая прибыльная группа</div>
              </div>
          </div>
          <div class="stat-card-teacher">
              <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
              <div class="stat-content">
                  <div class="stat-value" id="teacherAvgPerLesson">0 ₽</div>
                  <div class="stat-label">Средний чек за урок</div>
              </div>
          </div>
      </div>

      <!-- График выручки -->
      <div style="margin-top: 2rem;">
          <h3><i class="fas fa-chart-bar"></i> Динамика выручки</h3>
          <canvas id="teacherRevenueChart" style="width: 100%; max-height: 300px;"></canvas>
      </div>

      <!-- График уроков -->
      <div style="margin-top: 2rem;">
          <h3><i class="fas fa-chart-line"></i> Динамика уроков</h3>
          <canvas id="teacherLessonsChart" style="width: 100%; max-height: 250px;"></canvas>
      </div>

      <!-- Два графика рядом -->
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
          <div>
              <h3><i class="fas fa-chart-pie"></i> Выручка по ученикам</h3>
              <canvas id="teacherStudentsChart" style="width: 100%; max-height: 250px;"></canvas>
          </div>
          <div>
              <h3><i class="fas fa-chart-pie"></i> Выручка по группам</h3>
              <canvas id="teacherGroupsChart" style="width: 100%; max-height: 250px;"></canvas>
          </div>
      </div>

      <!-- Топ учеников -->
      <div style="margin-top: 2rem;">
          <h3><i class="fas fa-crown"></i> Топ учеников</h3>
          <div class="table-responsive">
              <table>
                  <thead>
                      <tr>
                          <th>#</th>
                          <th>Ученик</th>
                          <th>Уроков</th>
                          <th>Оплачено (₽ / ₸)</th>
                          <th>Баланс</th>
                      </tr>
                  </thead>
                  <tbody id="teacherTopStudentsBody">
                      <tr><td colspan="5">Загрузка...</td></tr>
                  </tbody>
              </table>
          </div>
      </div>
  </div>
</template>


<template id="lessonsTemplate">
  <div class="form-card">
    <div class="card-header">
      <h2><i class="fas fa-list"></i> Все уроки</h2>
      <button class="btn btn-primary" id="addLessonFromJournalBtn">
        <i class="fas fa-plus"></i> Добавить урок
      </button>
    </div>

    <!-- Фильтры -->
    <div class="filters" style="margin-bottom: 1.5rem;">
      <input type="date" id="lessonsFilterDateFrom" placeholder="С даты">
      <input type="date" id="lessonsFilterDateTo" placeholder="По дату">
      <select id="lessonsFilterStudent">
        <option value="">Все ученики</option>
      </select>
      <select id="lessonsFilterGroup">
        <option value="">Все группы</option>
      </select>
      <select id="lessonsFilterStatus">
        <option value="">Все статусы</option>
        <option value="planned">Запланирован</option>
        <option value="completed">Проведён</option>
        <option value="cancelled">Отменён</option>
      </select>
      <button class="btn btn-sm btn-primary" id="applyLessonsFiltersBtn">
        <i class="fas fa-filter"></i> Применить
      </button>
      <button class="btn btn-sm btn-secondary" id="resetLessonsFiltersBtn">
        <i class="fas fa-times"></i> Сбросить
      </button>
    </div>

    <!-- Таблица -->
    <div class="table-responsive">
      <table id="allLessonsTable">
        <thead>
          <tr>
            <th>Дата</th>
            <th>Ученик/Группа</th>
            <th>Тема</th>
            <th>Статус</th>
            <th>Присутствие</th>
            <th>Заметки</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="allLessonsTableBody">
          <tr><td colspan="7">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</template>

<!-- Шаблон страницы Заметки -->
  <template id="notesTemplate">
    <div class="notes-container">
      <!-- Боковая панель -->
      <div class="notes-sidebar">
        <div class="notes-sidebar-header">
          <h3>Заметки</h3>
          <button id="newNoteBtn" class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> Новая</button>
        </div>
        
        <!-- Фильтры -->
        <div class="notes-filters">
          <input type="text" id="notesSearchInput" placeholder="Поиск по названию..." class="search-input">
          <select id="folderFilterSelect">
            <option value="">Все папки</option>
          </select>
          <select id="studentFilterSelect">
            <option value="">Все ученики</option>
          </select>
          <select id="groupFilterSelect">
            <option value="">Все группы</option>
          </select>
          <button id="clearFiltersBtn" class="btn btn-sm btn-secondary">Сбросить</button>
        </div>
  
        <!-- Список заметок -->
        <div class="notes-list" id="notesListContainer">
          <p class="text-muted">Нет заметок</p>
        </div>
      </div>
  
      <!-- Редактор -->
      <div class="notes-editor" id="notesEditorContainer">
        <div class="notes-editor-placeholder">
          <i class="fas fa-sticky-note" style="font-size: 3rem; color: var(--neutral-gray);"></i>
          <p>Выберите или создайте заметку</p>
        </div>
      </div>
    </div>
  </template>

<template id="groupCardTemplate">
  <div class="group-card">
    <div class="group-card-header"><h3 class="group-name"></h3><span class="group-subject"></span></div>
    <div class="group-stats"><span><strong class="students-count">0</strong> учеников</span><span>Следующее занятие: <span class="next-lesson">Нет занятий</span></span></div>
    <div class="group-students-preview"><div class="no-students">Нет учеников</div></div>
    <div class="group-card-footer">
      <button class="btn-icon open-full-group" title="Открыть"><i class="fas fa-eye"></i></button>
      <button class="btn-icon schedule-lesson-btn" title="Назначить урок"><i class="fas fa-calendar-plus"></i></button>
      <button class="btn-icon delete-group" title="Удалить"><i class="fas fa-trash"></i></button>
    </div>
  </div>
</template>

<template id="groupFullCardTemplate">
  <div class="modal">
    <div class="modal-card">
      <div class="modal-header"><h2 id="fullGroupName"></h2><button class="close-modal">&times;</button></div>
      <div class="modal-body">
        <div class="tabs">
          <button class="tab active" data-tab="info">Информация</button>
          <button class="tab" data-tab="students">Ученики</button>
          <button class="tab" data-tab="lessons">Расписание</button>
        </div>
        <div class="tab-content active" id="tabGroupInfo">
          <form id="groupInfoForm"><div class="form-group">
            <label>Заметки</label>
            <textarea id="groupNotes" rows="3"></textarea>
          </div><div class="form-grid"><div class="form-group"><label>Название</label><input id="editGroupName" required></div><div class="form-group"><label>Предмет</label><input id="editGroupSubject"></div></div></form>
        </div>
        <div class="tab-content" id="tabGroupStudents">
          <div class="students-list-full"></div>
          <p class="no-students-tab">Нет учеников в группе</p>
          <button class="btn btn-primary mt-2" id="addStudentToGroupBtn"><i class="fas fa-plus"></i> Добавить ученика</button>
        </div>
        <div class="tab-content" id="tabGroupLessons">
          <div class="lessons-list-full"></div>
          <p class="no-lessons-tab">Нет запланированных уроков</p>
          <button class="btn btn-primary mt-2" id="scheduleLessonInGroupBtn"><i class="fas fa-calendar-plus"></i> Назначить урок</button>
        </div>
      </div>
      <div class="modal-footer"><button id="saveFullGroup" class="btn btn-success">Сохранить</button></div>
    </div>
  </div>
</template>


<!-- Шаблон модального окна профиля учителя -->
<template id="profileModalTemplate">
  <div class="modal">
    <div class="modal-card" style="max-width: 450px;">
      <div class="modal-header">
        <h2>Профиль учителя</h2>
        <button class="close-modal">&times;</button>
      </div>
      <form id="profileForm">
        <div class="form-group">
          <label for="teacherName">Имя</label>
          <input type="text" id="teacherName" placeholder="Ваше имя" required>
        </div>
        <div class="form-group">
          <label for="teacherBirthday">Дата рождения</label>
          <input type="date" id="teacherBirthday">
        </div>
        <div class="form-group">
          <label for="teacherEmail">Email</label>
