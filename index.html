<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleEd CRM — Панель управления</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>SimpleEd</span>
            </div>
            <nav>
                <a href="#" class="active" data-page="home"><i class="fas fa-home"></i> Главная</a>
                <a href="#" data-page="students"><i class="fas fa-users"></i> Ученики</a>
                <a href="#" data-page="finance"><i class="fas fa-wallet"></i> Финансы</a>
                <a href="#" data-page="notes"><i class="fas fa-sticky-note"></i> Заметки</a>
            </nav>
            <div class="sidebar-footer">
                <button id="supportBtn"><i class="fas fa-headset"></i> Поддержка</button>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>Сегодня, <span id="currentDate"></span></h1>
                <div class="user-profile">
                    <span id="teacherNameDisplay">Загрузка...</span>
                    <div class="avatar" id="userAvatar">У</div>
                    <button id="logoutBtn" class="logout-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <section class="dashboard-grid" id="dashboardContent">
                <!-- Динамический контент будет загружаться через JS -->
                <div class="loader">Загрузка данных...</div>
            </section>
        </main>
    </div>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="session-check.js"></script>
    <script src="app.js"></script>
</body>
</html>
