<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в SimpleEd CRM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>SimpleEd</span>
            </div>
            <h2>Добро пожаловать</h2>
            <p>Введите ваш email и пароль</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="teacher@example.com" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="xxxxxxxxx" required>
                </div>
                <button type="submit" class="btn-login">Войти в систему</button>
            </form>
            
            <div class="auth-footer">
                <a href="#" id="supportLink">Проблемы со входом?</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
