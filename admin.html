<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель SimpleEd</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>SimpleEd Admin</span>
            </div>
            <h2>Вход для владельца</h2>
            <p>Введите ваш email и пароль</p>
            
            <form id="adminLoginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Войти</button>
            </form>
            <div id="loginError" class="error-message" style="color: #d32f2f; margin-top: 1rem;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Простая проверка входа админа
        const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const form = document.getElementById('adminLoginForm');
        const errorDiv = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            // Ищем админа по email и паролю
            const { data, error } = await supabase
                .from('platform_admins')
                .select('email, full_name, role')
                .eq('email', email)
                .eq('password', password)
                .maybeSingle();

            if (error || !data) {
                errorDiv.textContent = 'Неверный email или пароль';
                return;
            }

            // Сохраняем сессию админа в localStorage
            localStorage.setItem('adminAuth', JSON.stringify({
                email: data.email,
                name: data.full_name,
                role: data.role,
                loggedAt: new Date().toISOString()
            }));

            // Перенаправляем в админ-панель
            window.location.href = 'admin_panel.html';
        });
    </script>
</body>
</html>
